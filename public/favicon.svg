<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="fg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E91E8C"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>
    <linearGradient id="fg2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>
  </defs>
  <rect width="64" height="64" rx="16" fill="#0d0d0d"/>
  <!-- Two overlapping cards — the "duel" -->
  <rect x="12" y="14" width="24" height="32" rx="5" fill="url(#fg)" opacity="0.9" transform="rotate(-8, 24, 30)"/>
  <rect x="28" y="14" width="24" height="32" rx="5" fill="url(#fg2)" opacity="0.9" transform="rotate(8, 40, 30)"/>
  <!-- Center spark — the moment of choice -->
  <circle cx="32" cy="30" r="5" fill="#0d0d0d"/>
  <circle cx="32" cy="30" r="3" fill="white"/>
</svg>
